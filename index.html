<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fasfos Memories 🐾</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #faf3e0 0%, #f5e6d3 50%, #faf3e0 100%);
            color: #6b4423;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== القطة الجديدة - ماسكة الحافة ===== */
        .corner-cat {
            position: fixed;
            bottom: -30px;
            left: 0;
            width: 220px;
            height: 220px;
            z-index: 1000;
            pointer-events: none;
        }

        /* جسم القطة */
        .cat-body {
            position: absolute;
            bottom: 0;
            left: 30px;
            width: 140px;
            height: 100px;
            background: linear-gradient(180deg, #f5e6c8 0%, #edd9a8 100%);
            border-radius: 70px 70px 0 0;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.08);
        }

        /* الرأس */
        .cat-head {
            position: absolute;
            bottom: 70px;
            left: 40px;
            width: 110px;
            height: 100px;
            background: linear-gradient(180deg, #f5e6c8 0%, #edd9a8 100%);
            border-radius: 50% 50% 45% 45%;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
        }

        /* الأذنين */
        .cat-ear {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-bottom: 35px solid #f5e6c8;
        }

        .ear-left {
            bottom: 150px;
            left: 45px;
            transform: rotate(-20deg);
        }

        .ear-left::after {
            content: "";
            position: absolute;
            top: 12px;
            left: -10px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 22px solid #ffb6c1;
        }

        .ear-right {
            bottom: 150px;
            left: 95px;
            transform: rotate(20deg);
        }

        .ear-right::after {
            content: "";
            position: absolute;
            top: 12px;
            left: -10px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 22px solid #ffb6c1;
        }

        /* العيون (مغلقة بابتسامة زي الرسمة) */
        .cat-eye {
            position: absolute;
            width: 18px;
            height: 10px;
            border-bottom: 3px solid #8b6f47;
            border-radius: 0 0 50% 50%;
            bottom: 120px;
        }

        .eye-left {
            left: 60px;
        }

        .eye-right {
            left: 100px;
        }

        /* الأنف الوردي */
        .cat-nose {
            position: absolute;
            width: 12px;
            height: 10px;
            background: #ffb6c1;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            bottom: 108px;
            left: 85px;
        }

        /* الفم */
        .cat-mouth {
            position: absolute;
            bottom: 100px;
            left: 85px;
            width: 10px;
            height: 6px;
            border-bottom: 2px solid #8b6f47;
            border-radius: 0 0 50% 50%;
        }

        /* الشوارب */
        .whisker {
            position: absolute;
            width: 35px;
            height: 2px;
            background: #d4a574;
            bottom: 108px;
